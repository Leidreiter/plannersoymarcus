<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planner 2026</title>
  <link rel="icon" href="img/logo.svg" type="image/svg+xml">

  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1115">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Planner 2026">
  <link rel="apple-touch-icon" href="../img/logo.svg">
  <link rel="icon" type="image/svg+xml" href="../img/logo.svg">

  <link rel="stylesheet" href="css/styles.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="app-header">
  <div class="logos-title">
    <img src="img/logo.svg" alt="Soy Marcus" class="logo">
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">
        <i class="fa-solid fa-magnifying-glass"></i>
      </span>
      <input
        type="search"
        id="searchInput"
        placeholder="Buscar unidad, formato, red o comentario…"
        autocomplete="off"
        spellcheck="false"
      >
      <span id="searchCount" class="search-count"></span>
      <button id="clearSearch" class="clear-search hidden" title="Limpiar búsqueda" aria-label="Limpiar búsqueda">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="toolbar-actions">
      <button id="exportJsonBtn" class="btn-secondary" title="Exportar backup JSON">
        <i class="fa-solid fa-file-code"></i> <span class="btn-label">JSON</span>
      </button>
      <button id="importJsonBtn" class="btn-secondary" title="Importar backup JSON">
        <i class="fa-solid fa-upload"></i> <span class="btn-label">Importar</span>
      </button>
      <button id="exportCsvBtn" class="btn-secondary" title="Exportar a CSV">
        <i class="fa-solid fa-file-csv"></i> <span class="btn-label">CSV</span>
      </button>
      <button id="exportPdfBtn" class="btn-secondary" title="Exportar a PDF">
        <i class="fa-solid fa-file-pdf"></i> <span class="btn-label">PDF</span>
      </button>
      <input type="file" id="importFileInput" accept="application/json,.json" hidden>
    </div>
  </div>
</header>

<div class="calendar-container">
  <main id="calendar" class="calendar"></main>
</div>

<footer class="app-footer">
  <p>Éste proyecto fué desarrollado con ❤️ por <a href="https://soymarcus.dev" target="_blank" rel="noopener">@soymarcusdev</a></p>
</footer>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    
    <div class="modal-header">
      <h2 id="modal-date"></h2>
      <button id="closeModal">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div id="captureArea">
      <table class="planner-table">
        <thead>
          <tr>
            <th>Hora</th>
            <th>Unidad</th>
            <th>Formato</th>
            <th>Redes</th>
            <th><i class="fa-solid fa-heart"></i></th>
            <th><i class="fa-solid fa-chart-line"></i></th>
            <th><i class="fa-solid fa-comment-dots"></i></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="modal-actions">
      <div class="slot-actions">
        <button id="removeSlotBtn" class="btn-secondary" title="Eliminar último slot">
          <i class="fa-solid fa-minus"></i> Slot
        </button>
        <button id="addSlotBtn" class="btn-secondary" title="Añadir nuevo slot">
          <i class="fa-solid fa-plus"></i> Slot
        </button>
      </div>
      <button id="captureBtn">
        <i class="fa-solid fa-camera"></i> Capturar
      </button>
    </div>

  </div>
</div>

<!-- Presets de horario sugerido -->
<datalist id="timePresets">
  <option value="09:00">
  <option value="12:00">
  <option value="15:00">
  <option value="18:00">
  <option value="22:00">
</datalist>

<!-- Librerías externas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
